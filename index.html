<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f5efe4" />

  <!-- iOS PWA tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Training" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />

  <title>Training & Ernährung</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f5efe4;
      --surface: #fbf7ee;
      --surface-hi: #ebe1ce;
      --border: #d6c9b3;
      --text: #3d3528;
      --text-muted: #807767;
      --text-dim: #a89e8c;
      --accent: #7fa55f;
      --accent-hi: #6b9050;
      --success: #88b66c;
      --warn: #c89968;
      --danger: #c97a6c;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(circle at 20% 0%, rgba(127, 165, 95, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(200, 153, 104, 0.06) 0%, transparent 40%);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      overscroll-behavior-y: contain;
    }

    .display { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; letter-spacing: 0.02em; }

    .container { max-width: 880px; margin: 0 auto; padding: 20px 18px 100px; }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #5d7d4a);
      display: grid; place-items: center; color: white;
    }
    .logo-text { font-family: 'Big Shoulders Display', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 0.06em; }

    .nav { display: flex; gap: 4px; }
    .nav button {
      background: transparent; border: 1px solid transparent; color: var(--text-muted);
      padding: 8px 12px; font-family: inherit; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border-radius: 8px;
      transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    .nav button:hover, .nav button:focus { color: var(--text); background: var(--surface); }
    .nav button.active { color: var(--text); background: var(--surface-hi); border-color: var(--border); }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; }

    .hero-card {
      background: linear-gradient(135deg, var(--surface) 0%, #f0e8d4 100%);
      border: 1px solid var(--border); border-radius: 20px; padding: 28px;
      position: relative; overflow: hidden; margin-bottom: 16px;
    }
    .hero-card::before {
      content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(127, 165, 95, 0.18) 0%, transparent 60%); pointer-events: none;
    }
    .hero-label { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
    .hero-title { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 56px; line-height: 0.9; margin-bottom: 8px; position: relative; letter-spacing: 0.02em; }
    .hero-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; position: relative; }

    /* BUTTONS */
    .btn {
      font-family: inherit; font-weight: 700; font-size: 13px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 14px 22px; border-radius: 10px;
      border: none; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 8px; -webkit-appearance: none;
    }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 14px rgba(127, 165, 95, 0.35); }
    .btn-primary:hover, .btn-primary:active { background: var(--accent-hi); }
    .btn-primary:disabled { background: var(--surface-hi); color: var(--text-dim); cursor: not-allowed; box-shadow: none; }
    .btn-ghost { background: var(--surface-hi); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
    .btn-danger:hover { border-color: var(--danger); }

    /* DAYS GRID */
    .day-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 20px; }
    .day-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
    }
    .day-card:active { transform: scale(0.98); }
    .day-card.suggested { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(127, 165, 95, 0.2); }
    .day-card.disabled { opacity: 0.45; cursor: not-allowed; }
    .day-num { font-family: 'Big Shoulders Display', sans-serif; font-weight: 900; font-size: 44px; line-height: 1; color: var(--text-dim); }
    .day-name { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 0.03em; margin-top: 4px; }
    .day-count { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .suggested-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 100px; letter-spacing: 0.1em; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 20px; position: relative; }
    .stat { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .stat-val { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: 0.02em; }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    /* WORKOUT */
    .workout-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center;
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .back-btn:hover { background: var(--surface-hi); }

    .exercise-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
    .exercise-header { margin-bottom: 14px; }
    .exercise-muscle { display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 0.14em; color: var(--accent-hi); padding: 4px 8px; background: rgba(127, 165, 95, 0.15); border-radius: 4px; margin-bottom: 8px; }
    .exercise-name-row { display: flex; align-items: center; gap: 8px; }
    .exercise-name { font-family: 'Big Shoulders Display', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 0.02em; flex: 1; min-width: 0; }
    .rename-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center;
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .rename-btn:hover { border-color: var(--accent); color: var(--accent); }
    .exercise-name.renamed { font-style: italic; }
    .renamed-orig { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .exercise-meta { display: flex; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }
    .meta-tag { padding: 4px 10px; background: var(--surface-hi); border-radius: 100px; }

    .sets-table { width: 100%; margin-top: 18px; }
    .set-entry { padding: 14px 0; border-bottom: 1px solid var(--border); }
    .set-entry:last-child { border-bottom: none; }
    .set-entry.done .set-num { color: var(--success); }
    .set-row {
      display: grid; grid-template-columns: 28px 1fr 1fr 1fr 36px;
      gap: 8px; align-items: center;
    }
    .set-row.header { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; padding: 0 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .set-row.header > * { padding: 0 4px; text-align: center; }
    .set-num { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 22px; color: var(--text-dim); text-align: center; }

    .set-note { margin-top: 10px; padding-left: 36px; padding-right: 44px; }
    .field-note {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px dashed var(--border); color: var(--text-muted);
      padding: 4px 2px; font-size: 12px; font-family: inherit; text-align: left;
      -webkit-appearance: none;
    }
    .field-note::placeholder { color: var(--text-dim); font-style: italic; }
    .field-note:focus { outline: none; border-bottom-color: var(--accent); border-bottom-style: solid; color: var(--text); }
    .set-note-readonly { margin-top: 8px; padding-left: 36px; font-size: 12px; color: var(--text-muted); font-style: italic; }

    .field-wrap { position: relative; }
    .field {
      width: 100%; background: #ffffff; border: 1px solid var(--border); color: var(--text);
      padding: 12px 8px; border-radius: 8px; font-family: inherit; font-size: 15px; font-weight: 600;
      text-align: center; -webkit-appearance: none;
    }
    .field:focus { outline: none; border-color: var(--accent); }
    .prev { font-size: 9px; color: var(--text-dim); position: absolute; bottom: -13px; left: 0; right: 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .check-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      width: 36px; height: 36px; border-radius: 8px; display: grid; place-items: center; cursor: pointer;
      transition: all 0.15s;
    }
    .check-btn:hover { border-color: var(--success); color: var(--success); }
    .check-btn.checked { background: var(--success); border-color: var(--success); color: #ffffff; }

    .complete-row { margin-top: 24px; display: flex; gap: 12px; justify-content: space-between; }

    /* HISTORY */
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s;
    }
    .history-item:hover { border-color: var(--accent); }
    .history-left { display: flex; align-items: center; gap: 14px; }
    .history-day { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 20px; width: 50px; color: var(--accent); letter-spacing: 0.04em; }
    .history-date { font-weight: 700; font-size: 15px; }
    .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* PROGRESS */
    .progress-item { margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .progress-name { font-weight: 700; font-size: 14px; }
    .progress-max { font-family: 'Big Shoulders Display', sans-serif; font-size: 22px; color: var(--accent); font-weight: 800; }
    .progress-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 50px; }
    .bar { flex: 1; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 4px; opacity: 0.7; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 14px; opacity: 0.4; }

    /* iOS install hint */
    .install-hint {
      background: rgba(127, 165, 95, 0.12); border: 1px solid rgba(127, 165, 95, 0.35);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
      font-size: 13px; color: var(--text-muted); display: flex; gap: 10px; align-items: flex-start;
    }
    .install-hint strong { color: var(--text); }
    .install-hint .close { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 0; margin-left: auto; font-size: 18px; line-height: 1; }

    @media (max-width: 600px) {
      .container { padding: 14px 12px 100px; }
      .hero-title { font-size: 44px; }
      .nav button span { display: none; }
      .nav button { padding: 8px 10px; }
      .set-row { grid-template-columns: 26px 1fr 1fr 1fr 34px; gap: 6px; }
      .set-note { padding-left: 32px; padding-right: 40px; }
      .set-note-readonly { padding-left: 32px; }
      .day-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-val { font-size: 22px; }
      .field { padding: 10px 4px; font-size: 14px; }
    }

    /* Mini icons */
    .icon { width: 14px; height: 14px; display: inline-block; vertical-align: middle; }

    /* MODE SWITCHER */
    .mode-switch { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; }
    .mode-switch button {
      background: transparent; border: none; color: var(--text-muted);
      padding: 9px 16px; font-family: 'Big Shoulders Display', sans-serif; font-size: 16px; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 9px; transition: all 0.15s;
    }
    .mode-switch button.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(127,165,95,0.3); }

    /* NUTRITION — date nav */
    .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .date-nav .date-label { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 20px; text-align: center; flex: 1; letter-spacing: 0.02em; }
    .date-nav .date-label small { display: block; font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; }
    .date-nav button {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      width: 42px; height: 42px; border-radius: 10px; display: grid; place-items: center; cursor: pointer; flex-shrink: 0;
    }
    .date-nav button:active { background: var(--surface-hi); }

    /* NUTRITION — meals */
    .meal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .meal-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .meal-name { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 0.02em; flex: 1; min-width: 0; }
    .meal-kcal { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 19px; color: var(--accent); white-space: nowrap; }
    .meal-rename, .meal-del {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; cursor: pointer; flex-shrink: 0;
    }
    .meal-rename:hover { border-color: var(--accent); color: var(--accent); }
    .meal-del:hover { border-color: var(--danger); color: var(--danger); }

    .food-item { padding: 9px 0; border-bottom: 1px dashed var(--border); }
    .food-item:last-of-type { border-bottom: none; }
    .food-row { display: grid; grid-template-columns: 1fr 84px 26px; gap: 8px; align-items: center; }
    .food-select {
      width: 100%; background: #fff; border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px 6px; font-family: inherit; font-size: 13px; font-weight: 600; -webkit-appearance: none;
    }
    .food-select:focus { outline: none; border-color: var(--accent); }
    .food-amount-wrap { position: relative; }
    .food-amount {
      width: 100%; background: #fff; border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px 24px 10px 8px; font-family: inherit; font-size: 14px; font-weight: 600;
      text-align: right; -webkit-appearance: none;
    }
    .food-amount:focus { outline: none; border-color: var(--accent); }
    .food-unit { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-dim); pointer-events: none; }
    .food-del { background: transparent; border: none; color: var(--text-dim); font-size: 20px; line-height: 1; cursor: pointer; width: 26px; height: 38px; display: grid; place-items: center; }
    .food-del:hover { color: var(--danger); }
    .food-macros { font-size: 10px; color: var(--text-dim); letter-spacing: 0.03em; margin-top: 5px; }
    .add-food-btn {
      background: transparent; border: 1px dashed var(--border); color: var(--text-muted);
      width: 100%; padding: 10px; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em; cursor: pointer; margin-top: 10px;
    }
    .add-food-btn:hover { border-color: var(--accent); color: var(--accent); }
    .add-meal-btn {
      background: var(--surface-hi); border: 1px solid var(--border); color: var(--text);
      width: 100%; padding: 14px; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-bottom: 12px;
    }

    /* NUTRITION — day total */
    .day-total-card {
      background: linear-gradient(135deg, var(--surface) 0%, #f0e8d4 100%);
      border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-top: 8px;
      position: relative; overflow: hidden;
    }
    .day-total-card .hero-label { color: var(--accent); }
    .day-total-kcal { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 46px; line-height: 1; }
    .day-total-kcal small { font-size: 18px; color: var(--text-muted); font-weight: 700; }
    .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
    .macro-box { background: rgba(255,255,255,0.45); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
    .macro-box .v { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; font-size: 24px; }
    .macro-box .l { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
    .macro-box.c .v { color: #c89968; }
    .macro-box.p .v { color: var(--accent); }
    .macro-box.f .v { color: #c97a6c; }

    /* EDIT FORM (training date/time/duration) */
    .edit-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
    .edit-form .edit-title { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
    .edit-form label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 12px 0 5px; }
    .edit-form input {
      width: 100%; background: #fff; border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 11px; font-family: inherit; font-size: 15px; -webkit-appearance: none;
    }
    .edit-form input:focus { outline: none; border-color: var(--accent); }
    .edit-actions { display: flex; gap: 10px; margin-top: 18px; }
    .edit-actions .btn { flex: 1; justify-content: center; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ========================================================
    // TRAININGSPLÄNE
    // ========================================================
    const PLANS = {
      1: {
        name: 'GLUTES',
        exercises: [
          { muscle: 'GLUTES', name: 'Smith Machine Glute Bridge', sets: 3, repRange: '6-10', type: 'Straight Set', cadence: '2s Hold in der vollen Kontraktion', targetRIR: [1, 1, 0] },
          { muscle: 'HAMS', name: 'Dumbbell Romanian Deadlift', sets: 2, repRange: '5-8', type: 'Straight Set', cadence: '1s Pause in der vollen Dehnung', targetRIR: [1, 0] },
          { muscle: 'HAMS', name: 'Seated Leg Curl', sets: 2, repRange: '8-12', type: 'Straight Set', cadence: '-', targetRIR: [0, 0] },
          { muscle: 'GLUTES', name: 'Unilateral Horizontal Leg Press', sets: 2, repRange: '5-8', type: 'Straight Set', cadence: '1s Pause in der vollen Dehnung', targetRIR: [1, 0] },
          { muscle: 'GLUTES', name: 'Hip Abductor', sets: 2, repRange: '8-12', type: 'Straight Set / MRP*2', cadence: 'Pause in beiden Umkehrpunkten', targetRIR: [0, 0] },
          { muscle: 'GLUTES', name: 'Cable Glute Kickback (Standing)', sets: 2, repRange: '8-12', type: 'Straight Set', cadence: '1s Pause in der Kontraktion', targetRIR: [0, 0] },
          { muscle: 'ABS', name: 'Plank', sets: 2, repRange: '30-60s', type: 'Straight Set', cadence: '-', targetRIR: [0, 0] },
        ],
      },

    function todayKey(d) {
      const dt = d ? new Date(d) : new Date();
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, '0');
      const day = String(dt.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

    // Tiefe Kopie der Baseline-Vorlage -> frische Mahlzeiten (mit neuen IDs)
    function cloneMeals(meals) {
      return meals.map(m => ({
        id: uid(),
        name: m.name,
        items: m.items.map(it => ({ id: uid(), food: it.food, amount: it.amount })),
      }));
    }

    function loadState() {
      try {
        const w = localStorage.getItem('eisern:workouts');
        const c = localStorage.getItem('eisern:current');
        const d = localStorage.getItem('eisern:installHintDismissed');
        const mode = localStorage.getItem('eisern:mode');
        const np = localStorage.getItem('eisern:nutritionPlan');
        const nd = localStorage.getItem('eisern:nutritionDays');
        if (w) state.workouts = JSON.parse(w);
        if (c) state.current = JSON.parse(c);
        if (d) state.installHintDismissed = JSON.parse(d);
        if (mode === 'training' || mode === 'nutrition') state.mode = mode;
        if (np) state.nutritionPlan = JSON.parse(np);
        if (nd) state.nutritionDays = JSON.parse(nd);
      } catch (e) { console.error('load error', e); }
      // Baseline-Plan einmalig anlegen, falls noch keiner existiert
      if (!state.nutritionPlan || !Array.isArray(state.nutritionPlan.meals)) {
        state.nutritionPlan = { meals: cloneMeals(NUTRITION_BASELINE) };
        saveNutritionPlan();
      }
    }

    function saveWorkouts() {
      try { localStorage.setItem('eisern:workouts', JSON.stringify(state.workouts)); } catch (e) {}
    }

    function saveCurrent() {
      try {
        if (state.current) localStorage.setItem('eisern:current', JSON.stringify(state.current));
        else localStorage.removeItem('eisern:current');

    }

    // Tageseintrag anlegen (aus Baseline vorbefüllt), aber NICHT speichern bis bearbeitet
    function ensureDay(dateKey) {
      if (!state.nutritionDays[dateKey]) {
        state.nutritionDays[dateKey] = { meals: cloneMeals(state.nutritionPlan.meals) };
      }
      return state.nutritionDays[dateKey];
    }

    // Meals-Array je nach Kontext (Plan-Vorlage oder konkreter Tag)
    function getMealsForCtx(ctx) {
      return ctx === 'plan' ? state.nutritionPlan.meals : ensureDay(state.nutriDate).meals;
    }
    function saveCtx(ctx) {
      if (ctx === 'plan') saveNutritionPlan(); else saveNutritionDays();
    }

    // Makros eines Lebensmittels berechnen
    function itemMacros(item) {
      const f = FOOD_BY_NAME[item.food];
      const amt = parseFloat(item.amount) || 0;
      if (!f) return { kcal: 0, c: 0, p: 0, f: 0 };
      const c = f.c * amt, p = f.p * amt, fat = f.f * amt;
      return { kcal: c * 4 + p * 4 + fat * 9, c, p, f: fat };
    }

    function mealMacros(meal) {
      return meal.items.reduce((t, it) => {
        const m = itemMacros(it);
        t.kcal += m.kcal; t.c += m.c; t.p += m.p; t.f += m.f;
        return t;
      }, { kcal: 0, c: 0, p: 0, f: 0 });
    }

    function dayMacros(meals) {
      return meals.reduce((t, m) => {
        const mm = mealMacros(m);
        t.kcal += mm.kcal; t.c += mm.c; t.p += mm.p; t.f += mm.f;
        return t;
      }, { kcal: 0, c: 0, p: 0, f: 0 });
    }

    function r0(n) { return Math.round(n); }
    function r1(n) { return Math.round(n * 10) / 10; }

    // ========================================================
    // HELPERS
    // ========================================================
    function daysBetween(a, b) {
      const da = new Date(a); const db = new Date(b);
      da.setHours(0,0,0,0); db.setHours(0,0,0,0);
      return Math.floor((db - da) / 86400000);
    }

    function suggestNext() {
      const done = state.workouts.filter(w => w.completedAt);
      if (done.length === 0) return { day: 1, ready: true, reason: 'Start des Zyklus' };
      const last = done.sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt))[0];
      const ds = daysBetween(last.completedAt, new Date().toISOString());
      const t = TRANSITIONS[last.day];
      if (ds >= t.minRest) {
        return { day: t.next, ready: true, reason: ds === 0 ? 'Heute schon möglich' : ds + ' Tag' + (ds === 1 ? '' : 'e') + ' seit letztem Training' };
      }
      const wait = t.minRest - ds;
      return { day: t.next, ready: false, reason: 'Noch ' + wait + ' Tag' + (wait === 1 ? '' : 'e') + ' Pause empfohlen' };
    }

    function getPreviousSets(name) {
      const past = state.workouts.filter(w => w.completedAt).sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));
      for (const w of past) {
        const ex = w.exercises.find(e => e.name === name);
        if (ex) return ex.loggedSets;
      }
      return null;
    }

    // Dauer eines Trainings in Minuten (gespeichert oder aus Start/Ende berechnet)
    function workoutDuration(w) {
      if (typeof w.durationMin === 'number') return w.durationMin;
      if (w.startedAt && w.completedAt) {
        const min = Math.round((new Date(w.completedAt) - new Date(w.startedAt)) / 60000);
        return min >= 0 ? min : null;
      }
      return null;
    }

    function fmtDuration(min) {
      if (min == null) return '—';
      const h = Math.floor(min / 60), m = min % 60;
      return h > 0 ? `${h}h ${m}min` : `${m}min`;
    }

    function isIOSStandalone() {
      return ('standalone' in navigator) && navigator.standalone;
    }

    function isIOSSafari() {
      const ua = navigator.userAgent;
      return /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    }

    // ========================================================
    const ICONS = {
      dumbbell: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg>',
      calendar: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>',
      history: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>',
      trending: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',
      check: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      chevronLeft: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
      play: '<svg class="icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>',
      trash: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
      share: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle"><path d="M12 2v13"/><path d="m16 6-4-4-4 4"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>',
      edit: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
    };

    // ========================================================
    // ESCAPE
    // ========================================================
    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

    // ========================================================
    // RENDER VIEWS
    // ========================================================
    function renderHeader() {
      const v = state.view;
      const nv = state.nutriView;
      const subNav = state.mode === 'training' ? `
          <div class="nav">
            <button class="${v === 'home' ? 'active' : ''}" data-action="nav" data-view="home">${ICONS.calendar}<span>Start</span></button>
            <button class="${v === 'history' || v === 'history-detail' ? 'active' : ''}" data-action="nav" data-view="history">${ICONS.history}<span>Verlauf</span></button>
            <button class="${v === 'progress' ? 'active' : ''}" data-action="nav" data-view="progress">${ICONS.trending}<span>Fortschritt</span></button>
          </div>
      ` : `
          <div class="nav">
            <button class="${nv === 'day' ? 'active' : ''}" data-action="nutri-nav" data-view="day">${ICONS.calendar}<span>Tag</span></button>
            <button class="${nv === 'plan' ? 'active' : ''}" data-action="nutri-nav" data-view="plan">${ICONS.edit}<span>Plan</span></button>
            <button class="${nv === 'history' ? 'active' : ''}" data-action="nutri-nav" data-view="history">${ICONS.history}<span>Verlauf</span></button>
          </div>
      `;
      return `
        <div class="header" style="flex-direction: column; align-items: stretch; gap: 16px;">
          <div class="mode-switch">
            <button class="${state.mode === 'training' ? 'active' : ''}" data-action="mode" data-mode="training">Training</button>
            <button class="${state.mode === 'nutrition' ? 'active' : ''}" data-action="mode" data-mode="nutrition">Ernährung</button>
          </div>
          ${subNav}
        </div>
      `;
    }

    function renderInstallHint() {
      if (state.installHintDismissed || isIOSStandalone() || !isIOSSafari()) return '';
      return `
        <div class="install-hint">
          <div>
            <strong>Als App installieren:</strong> Tippe unten in Safari auf das Teilen-Symbol ${ICONS.share} und wähle "Zum Home-Bildschirm". Dann läuft EISERN wie eine echte App im Vollbild — perfekt fürs Gym.
          </div>
          <button class="close" data-action="dismiss-hint">×</button>
        </div>
      `;
    }

    function renderHome() {
      const s = suggestNext();
      const completed = state.workouts.filter(w => w.completedAt);
      const last7 = completed.filter(w => daysBetween(w.completedAt, new Date().toISOString()) < 7).length;
      const recentDays = new Set(completed.slice(-4).map(w => w.day));
      const cyclePct = ((recentDays.size / 4) * 100).toFixed(0) + '%';

      let activeBlock = '';
      if (state.current) {
        const p = PLANS[state.current.day];
        const startStr = new Date(state.current.startedAt).toLocaleString('de-DE', { weekday: 'long', hour: '2-digit', minute: '2-digit' });
        activeBlock = `
          <div class="hero-card" style="background: linear-gradient(135deg, var(--surface) 0%, #f3e8d0 100%);">
            <div class="hero-label" style="color: var(--warn);">Aktives Training</div>
            <div class="hero-title">${esc(p.name)}</div>
            <div class="hero-subtitle">Begonnen am ${esc(startStr)} Uhr</div>
            <button class="btn btn-primary" data-action="resume">${ICONS.play}Weiter trainieren</button>
          </div>
        `;
      }

      const dayCards = [1,2,3,4].map(d => `
        <div class="day-card ${s.day === d && s.ready ? 'suggested' : ''} ${state.current ? 'disabled' : ''}" data-action="start" data-day="${d}">
          ${s.day === d && s.ready ? '<div class="suggested-badge">DRAN</div>' : ''}
          <div class="day-num">0${d}</div>
          <div class="day-name">${esc(PLANS[d].name)}</div>
          <div class="day-count">${PLANS[d].exercises.length} Übungen</div>
        </div>
      `).join('');

      return `
        ${renderInstallHint()}
        ${activeBlock}
        <div class="hero-card">
          <div class="hero-label">Nächstes Training</div>
          <div class="hero-title">${esc(PLANS[s.day].name)}</div>
          <div class="hero-subtitle">${s.ready ? 'Tag ' + s.day + ' ist dran · ' + esc(s.reason) : esc(s.reason)}</div>
          <button class="btn btn-primary" data-action="start" data-day="${s.day}" ${state.current ? 'disabled' : ''}>
            ${ICONS.play}${state.current ? 'Erst aktives Training beenden' : 'Training starten'}
          </button>
          <div class="stats-row">
            <div class="stat"><div class="stat-val">${completed.length}</div><div class="stat-label">Trainings gesamt</div></div>
            <div class="stat"><div class="stat-val">${last7}</div><div class="stat-label">Letzte 7 Tage</div></div>
            <div class="stat"><div class="stat-val">${cyclePct}</div><div class="stat-label">Letzter Zyklus</div></div>
          </div>
        </div>
        <div class="day-grid">${dayCards}</div>
      `;
    }

    function renderWorkout() {
      if (!state.current) { state.view = 'home'; return renderHome(); }
      const w = state.current;
      const plan = PLANS[w.day];
      const total = w.exercises.reduce((s,ex) => s + ex.loggedSets.length, 0);
      const done = w.exercises.reduce((s,ex) => s + ex.loggedSets.filter(x => x.done).length, 0);

      const exHtml = w.exercises.map((ex, exIdx) => {
        const prev = getPreviousSets(ex.name);
        const cadenceTag = ex.cadence && ex.cadence !== '-' ? `<span class="meta-tag">${esc(ex.cadence)}</span>` : '';

        const rows = ex.loggedSets.map((set, sIdx) => {
          const prevSet = prev?.[sIdx];
          const prevText = prevSet?.weight ? `letzte: ${esc(prevSet.weight)}kg × ${esc(prevSet.reps)}` : '';
          return `
            <div class="set-entry ${set.done ? 'done' : ''}" data-row="${exIdx}-${sIdx}">
              <div class="set-row">
                <div class="set-num">${sIdx + 1}</div>
                <div class="field-wrap">
                  <input class="field" type="number" inputmode="decimal" step="0.5" placeholder="${prevSet?.weight ? esc(prevSet.weight) : '—'}" value="${esc(set.weight)}" data-input="weight" data-ex="${exIdx}" data-set="${sIdx}" />
                  ${prevText ? `<div class="prev">${prevText}</div>` : ''}
                </div>
                <div class="field-wrap">
                  <input class="field" type="text" inputmode="numeric" placeholder="${esc(ex.repRange)}" value="${esc(set.reps)}" data-input="reps" data-ex="${exIdx}" data-set="${sIdx}" />
                </div>
                <div class="field-wrap">
                  <input class="field" type="number" inputmode="numeric" value="${esc(set.rir)}" data-input="rir" data-ex="${exIdx}" data-set="${sIdx}" />
                </div>
                <button class="check-btn ${set.done ? 'checked' : ''}" data-action="toggle-done" data-ex="${exIdx}" data-set="${sIdx}" aria-label="Satz erledigt">${ICONS.check}</button>
              </div>
              <div class="set-note">
                <input class="field-note" type="text" placeholder="Notiz (z.B. Gewicht-Stufe, Gefühl, Technik...)" value="${esc(set.note ?? '')}" data-input="note" data-ex="${exIdx}" data-set="${sIdx}" />
              </div>
            </div>
          `;
        }).join('');

        const isRenamed = ex.originalName && ex.originalName !== ex.name;
        return `
          <div class="exercise-card">
            <div class="exercise-header">
              <span class="exercise-muscle">${esc(ex.muscle)}</span>
              <div class="exercise-name-row">
                <div class="exercise-name ${isRenamed ? 'renamed' : ''}">${esc(ex.name)}</div>
                <button class="rename-btn" data-action="rename-exercise" data-ex="${exIdx}" aria-label="Übung umbenennen">${ICONS.edit}</button>
              </div>
              ${isRenamed ? `<div class="renamed-orig">statt: ${esc(ex.originalName)}</div>` : ''}
              <div class="exercise-meta">
                <span class="meta-tag">Reps: ${esc(ex.repRange)}</span>
                <span class="meta-tag">${esc(ex.type)}</span>
                ${cadenceTag}
              </div>
            </div>
            <div class="sets-table">
              <div class="set-row header"><span>#</span><span>Kg</span><span>Reps</span><span>RIR</span><span></span></div>
              ${rows}
            </div>
          </div>
        `;
      }).join('');

      const dateStr = new Date(w.startedAt).toLocaleDateString('de-DE');

      return `
        <div class="workout-header">
          <button class="back-btn" data-action="nav" data-view="home">${ICONS.chevronLeft}</button>
          <div style="flex: 1;">
            <div class="hero-label">Tag ${w.day} · ${esc(dateStr)}</div>
            <div class="display" style="font-size: 30px; line-height: 1; margin-top: 4px;">${esc(plan.name)}</div>
          </div>
          <div style="text-align: right;">
            <div class="display" style="font-size: 26px; color: var(--accent);">${done}/${total}</div>
            <div style="font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase;">Sätze</div>
          </div>
        </div>
        ${exHtml}
        <div class="complete-row">
          <button class="btn btn-danger" data-action="discard">${ICONS.trash}Verwerfen</button>
          <button class="btn btn-primary" data-action="complete">${ICONS.check}Training abschließen</button>
        </div>
      `;
    }

    function renderHistory() {
      const done = state.workouts.filter(w => w.completedAt).sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));
      if (done.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">⏱</div><div>Noch keine Trainings aufgezeichnet.</div></div>`;
      }
      const items = done.map(w => {
        const plan = PLANS[w.day];
        const setCount = w.exercises.reduce((s,ex) => s + ex.loggedSets.filter(set => set.done || set.weight).length, 0);
        const dateStr = new Date(w.completedAt).toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        const timeStr = new Date(w.completedAt).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        const durStr = workoutDuration(w) != null ? ' · ' + fmtDuration(workoutDuration(w)) : '';
        return `
          <div class="history-item" data-action="view-workout" data-id="${esc(w.id)}">
            <div class="history-left">
              <div class="history-day">T${w.day}</div>
              <div>
                <div class="history-date">${esc(plan.name)}</div>
                <div class="history-meta">${esc(dateStr)} · ${esc(timeStr)} Uhr · ${setCount} Sätze${durStr}</div>
              </div>
            </div>
            <div style="color: var(--text-dim);">›</div>
          </div>
        `;
      }).join('');
      return `<div class="hero-label" style="margin-bottom: 12px;">Alle Trainings</div>${items}`;
    }

    function renderHistoryDetail() {
      const w = state.workouts.find(x => x.id === state.viewing);
      if (!w) { state.view = 'history'; return renderHistory(); }
      const plan = PLANS[w.day];
      const dateStr = new Date(w.completedAt).toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      const timeStr = new Date(w.completedAt).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      const dur = workoutDuration(w);

      if (state.editingWorkout) {
        const cd = new Date(w.completedAt);
        const dateVal = todayKey(cd);
        const timeVal = String(cd.getHours()).padStart(2, '0') + ':' + String(cd.getMinutes()).padStart(2, '0');
        return `
          <div class="workout-header">
            <button class="back-btn" data-action="cancel-edit-workout">${ICONS.chevronLeft}</button>
            <div style="flex: 1;">
              <div class="hero-label">Bearbeiten</div>
              <div class="display" style="font-size: 26px; line-height: 1; margin-top: 4px;">${esc(plan.name)}</div>
            </div>
          </div>
          <div class="edit-form">
            <div class="edit-title">Datum, Uhrzeit & Dauer anpassen</div>
            <label>Datum</label>
            <input type="date" id="edit-date" value="${dateVal}" />
            <label>Uhrzeit</label>
            <input type="time" id="edit-time" value="${timeVal}" />
            <label>Dauer (Minuten)</label>
            <input type="number" id="edit-duration" inputmode="numeric" min="0" step="1" placeholder="z.B. 60" value="${dur != null ? dur : ''}" />
            <div class="edit-actions">
              <button class="btn btn-ghost" data-action="cancel-edit-workout">Abbrechen</button>
              <button class="btn btn-primary" data-action="save-edit-workout">${ICONS.check}Speichern</button>
            </div>
          </div>
        `;
      }

      const exHtml = w.exercises.map(ex => {
        const rows = ex.loggedSets.map((set, sIdx) => `
          <div class="set-entry ${set.done ? 'done' : ''}">
            <div class="set-row">
              <div class="set-num">${sIdx + 1}</div>
              <div style="text-align: center; font-weight: 600;">${esc(set.weight) || '—'}</div>
              <div style="text-align: center; font-weight: 600;">${esc(set.reps) || '—'}</div>
              <div style="text-align: center; font-weight: 600;">${set.rir ?? '—'}</div>
              <div></div>
            </div>
            ${set.note ? `<div class="set-note-readonly">${esc(set.note)}</div>` : ''}
          </div>
        `).join('');
        const isRenamed = ex.originalName && ex.originalName !== ex.name;
        return `
          <div class="exercise-card">
            <div class="exercise-header">
              <span class="exercise-muscle">${esc(ex.muscle)}</span>
              <div class="exercise-name ${isRenamed ? 'renamed' : ''}">${esc(ex.name)}</div>
              ${isRenamed ? `<div class="renamed-orig">statt: ${esc(ex.originalName)}</div>` : ''}
            </div>
            <div class="sets-table">
              <div class="set-row header"><span>#</span><span>Kg</span><span>Reps</span><span>RIR</span><span></span></div>
              ${rows}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="workout-header">
          <button class="back-btn" data-action="nav" data-view="history">${ICONS.chevronLeft}</button>
          <div style="flex: 1;">
            <div class="hero-label">Tag ${w.day} · ${esc(dateStr)}</div>
            <div class="display" style="font-size: 28px; line-height: 1; margin-top: 4px;">${esc(plan.name)}</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">${esc(timeStr)} Uhr · Dauer ${esc(fmtDuration(dur))}</div>
          </div>
          <button class="rename-btn" data-action="edit-workout" aria-label="Bearbeiten" style="width: 40px; height: 40px;">${ICONS.edit}</button>
        </div>
        ${exHtml}
      `;
    }

    function renderProgress() {
      const completed = state.workouts.filter(w => w.completedAt);
      const byExercise = {};
      completed.forEach(w => {
        w.exercises.forEach(ex => {
          if (!byExercise[ex.name]) byExercise[ex.name] = [];
          ex.loggedSets.forEach(set => {
            if (set.weight && set.reps) {
              byExercise[ex.name].push({ date: w.completedAt, weight: parseFloat(set.weight), reps: parseInt(set.reps) });
            }
          });
        });
      });

      const names = Object.keys(byExercise).sort();
      if (names.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">📈</div><div>Noch keine Daten für Fortschritt.<br/>Trainiere ein paar Einheiten, um Trends zu sehen.</div></div>`;
      }

      const items = names.map(name => {
        const sets = byExercise[name];
        const max = Math.max(...sets.map(s => s.weight));
        const recent = sets.slice(-12);
        const bars = recent.map(s => `<div class="bar" style="height: ${(s.weight / max) * 100}%;" title="${esc(s.weight)}kg × ${esc(s.reps)}"></div>`).join('');
        return `
          <div class="progress-item">
            <div class="progress-top">
              <div class="progress-name">${esc(name)}</div>
              <div class="progress-max">${esc(max)} kg</div>
            </div>
            <div class="progress-meta">${sets.length} aufgezeichnete Sätze</div>
            <div class="bar-chart">${bars}</div>
          </div>
        `;
      }).join('');

      return `<div class="hero-label" style="margin-bottom: 16px;">Top-Gewichte pro Übung</div>${items}`;
    }

    // ========================================================
    // RENDER — ERNÄHRUNG
    // ========================================================
    function foodOptions(selected) {
      return FOOD_DB.map(f => `<option value="${esc(f.name)}" ${f.name === selected ? 'selected' : ''}>${esc(f.name)}</option>`).join('');
    }

    function renderMealsEditor(meals, ctx) {
      return meals.map((meal, mi) => {
        const mm = mealMacros(meal);
        const itemsHtml = meal.items.map((it, ii) => {
          const f = FOOD_BY_NAME[it.food];
          const unit = f && f.piece ? 'Stk' : 'g';
          const m = itemMacros(it);
          // Falls das Lebensmittel (noch) nicht in der DB ist, als eigene Option ergänzen
          const opts = f ? foodOptions(it.food)
                         : `<option value="${esc(it.food)}" selected>${esc(it.food)}</option>` + foodOptions(it.food);
          return `
            <div class="food-item">
              <div class="food-row">
                <select class="food-select" data-nutri="food" data-ctx="${ctx}" data-meal="${mi}" data-item="${ii}">${opts}</select>
                <div class="food-amount-wrap">
                  <input class="food-amount" type="number" inputmode="decimal" step="${f && f.piece ? '1' : '0.1'}" min="0" value="${esc(it.amount)}" data-nutri="amount" data-ctx="${ctx}" data-meal="${mi}" data-item="${ii}" />
                  <span class="food-unit">${unit}</span>
                </div>
                <button class="food-del" data-action="nutri-del-item" data-ctx="${ctx}" data-meal="${mi}" data-item="${ii}" aria-label="Entfernen">×</button>
              </div>
              <div class="food-macros" data-macro-item="${mi}-${ii}">${r0(m.kcal)} kcal · C ${r1(m.c)} · P ${r1(m.p)} · F ${r1(m.f)}</div>
            </div>
          `;
        }).join('');
        return `
          <div class="meal-card">
            <div class="meal-head">
              <div class="meal-name">${esc(meal.name)}</div>
              <div class="meal-kcal" data-meal-kcal="${mi}">${r0(mm.kcal)} kcal</div>
              <button class="meal-rename" data-action="nutri-rename-meal" data-ctx="${ctx}" data-meal="${mi}" aria-label="Umbenennen">${ICONS.edit}</button>
              <button class="meal-del" data-action="nutri-del-meal" data-ctx="${ctx}" data-meal="${mi}" aria-label="Mahlzeit löschen">×</button>
            </div>
            <div class="meal-macros-mini" data-meal-macros="${mi}" style="margin-bottom: 8px; color: var(--text-muted); font-size: 11px;">C ${r1(mm.c)}g · P ${r1(mm.p)}g · F ${r1(mm.f)}g</div>
            ${itemsHtml || '<div style="font-size:12px;color:var(--text-dim);padding:6px 0;">Noch keine Lebensmittel.</div>'}
            <button class="add-food-btn" data-action="nutri-add-item" data-ctx="${ctx}" data-meal="${mi}">+ Lebensmittel</button>
          </div>
        `;
      }).join('');
    }

    function renderDayTotal(meals, label) {
      const t = dayMacros(meals);
      return `
        <div class="day-total-card">
          <div class="hero-label">${label || 'Tagesgesamt'}</div>
          <div class="day-total-kcal" data-day-kcal>${r0(t.kcal)} <small>kcal</small></div>
          <div class="macro-grid">
            <div class="macro-box c"><div class="v" data-day-c>${r1(t.c)}g</div><div class="l">Carbs</div></div>
            <div class="macro-box p"><div class="v" data-day-p>${r1(t.p)}g</div><div class="l">Protein</div></div>
            <div class="macro-box f"><div class="v" data-day-f>${r1(t.f)}g</div><div class="l">Fett</div></div>
          </div>
        </div>
      `;
    }

    function renderNutriDay() {
      const dateKey = state.nutriDate;
      const existing = state.nutritionDays[dateKey];
      const meals = existing ? existing.meals : cloneMeals(state.nutritionPlan.meals);
      const dt = new Date(dateKey + 'T00:00:00');
      const isToday = dateKey === todayKey();
      const label = dt.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      return `
        <div class="date-nav">
          <button data-action="nutri-date-prev" aria-label="Vorheriger Tag">‹</button>
          <div class="date-label">${isToday ? 'Heute' : 'Tag'}<small>${esc(label)}</small></div>
          <button data-action="nutri-date-next" aria-label="Nächster Tag">›</button>
        </div>
        ${renderMealsEditor(meals, 'day')}
        <button class="add-meal-btn" data-action="nutri-add-meal" data-ctx="day">+ Mahlzeit hinzufügen</button>
        ${renderDayTotal(meals)}
        <div style="text-align: center; margin-top: 16px;">
          <button class="btn btn-danger" data-action="nutri-reset-day">Tag auf Baseline-Plan zurücksetzen</button>
        </div>
      `;
    }

    function renderNutriPlan() {
      const meals = state.nutritionPlan.meals;
      return `
        <div class="hero-card" style="margin-bottom: 16px;">
          <div class="hero-label">Baseline-Plan</div>
          <div class="hero-title" style="font-size: 32px;">Mein Plan</div>
          <div class="hero-subtitle" style="margin-bottom: 0;">Diese Vorlage wird für jeden neuen Tag automatisch übernommen. Änderungen hier gelten für künftige Tage — bereits getrackte Tage bleiben unverändert.</div>
        </div>
        ${renderMealsEditor(meals, 'plan')}
        <button class="add-meal-btn" data-action="nutri-add-meal" data-ctx="plan">+ Mahlzeit hinzufügen</button>
        ${renderDayTotal(meals, 'Plan gesamt')}
      `;
    }

    function renderNutriHistory() {
      const keys = Object.keys(state.nutritionDays).sort().reverse();
      if (keys.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">🍽</div><div>Noch keine Tage getrackt.<br/>Passe im Tab "Tag" deine Mahlzeiten an.</div></div>`;
      }
      const items = keys.map(k => {
        const t = dayMacros(state.nutritionDays[k].meals);
        const dt = new Date(k + 'T00:00:00');
        const dateStr = dt.toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        return `
          <div class="history-item" data-action="nutri-open-day" data-date="${esc(k)}">
            <div class="history-left">
              <div>
                <div class="history-date">${esc(dateStr)}</div>
                <div class="history-meta">C ${r0(t.c)}g · P ${r0(t.p)}g · F ${r0(t.f)}g</div>
              </div>
            </div>
            <div style="text-align: right;">
              <div class="progress-max">${r0(t.kcal)}</div>
              <div style="font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em;">KCAL</div>
            </div>
          </div>
        `;
      }).join('');
      return `<div class="hero-label" style="margin-bottom: 12px;">Getrackte Tage</div>${items}`;
    }

    // Makro-Anzeigen live aktualisieren (ohne komplettes Re-Render)
    function recalcNutri(ctx) {
      const meals = ctx === 'plan' ? state.nutritionPlan.meals : (state.nutritionDays[state.nutriDate]?.meals || []);
      meals.forEach((meal, mi) => {
        meal.items.forEach((it, ii) => {
          const m = itemMacros(it);
          const el = document.querySelector(`[data-macro-item="${mi}-${ii}"]`);
          if (el) el.textContent = `${r0(m.kcal)} kcal · C ${r1(m.c)} · P ${r1(m.p)} · F ${r1(m.f)}`;
        });
        const mm = mealMacros(meal);
        const kEl = document.querySelector(`[data-meal-kcal="${mi}"]`);
        if (kEl) kEl.textContent = `${r0(mm.kcal)} kcal`;
        const mEl = document.querySelector(`[data-meal-macros="${mi}"]`);
        if (mEl) mEl.textContent = `C ${r1(mm.c)}g · P ${r1(mm.p)}g · F ${r1(mm.f)}g`;
      });
      const t = dayMacros(meals);
      const dk = document.querySelector('[data-day-kcal]'); if (dk) dk.innerHTML = `${r0(t.kcal)} <small>kcal</small>`;
      const dc = document.querySelector('[data-day-c]'); if (dc) dc.textContent = `${r1(t.c)}g`;
      const dp = document.querySelector('[data-day-p]'); if (dp) dp.textContent = `${r1(t.p)}g`;
      const df = document.querySelector('[data-day-f]'); if (df) df.textContent = `${r1(t.f)}g`;
    }

    function attachNutriListeners() {
      if (state.mode !== 'nutrition') return;
      document.querySelectorAll('input[data-nutri="amount"]').forEach(input => {
        input.addEventListener('input', e => {
          const ctx = e.target.dataset.ctx;
          const mi = parseInt(e.target.dataset.meal), ii = parseInt(e.target.dataset.item);
          const meals = getMealsForCtx(ctx);
          if (meals[mi]?.items[ii]) {
            meals[mi].items[ii].amount = e.target.value;
            saveCtx(ctx);
            recalcNutri(ctx);
          }
        });
      });
      document.querySelectorAll('select[data-nutri="food"]').forEach(sel => {
        sel.addEventListener('change', e => {
          const ctx = e.target.dataset.ctx;
          const mi = parseInt(e.target.dataset.meal), ii = parseInt(e.target.dataset.item);
          const meals = getMealsForCtx(ctx);
          if (meals[mi]?.items[ii]) {
            meals[mi].items[ii].food = e.target.value;
            saveCtx(ctx);
            render(); // Einheit (g/Stk) & Makros neu aufbauen
          }
        });
      });
    }

    // ========================================================
    // MAIN RENDER
    // ========================================================
    function render() {
      let content = '';
      if (state.mode === 'nutrition') {
        if (state.nutriView === 'day') content = renderNutriDay();
        else if (state.nutriView === 'plan') content = renderNutriPlan();
        else if (state.nutriView === 'history') content = renderNutriHistory();
      } else {
        if (state.view === 'home') content = renderHome();
        else if (state.view === 'workout') content = renderWorkout();
        else if (state.view === 'history') content = renderHistory();
        else if (state.view === 'history-detail') content = renderHistoryDetail();
        else if (state.view === 'progress') content = renderProgress();
      }

      document.getElementById('app').innerHTML = `<div class="container">${renderHeader()}${content}</div>`;
      attachInputListeners();
      attachNutriListeners();
      window.scrollTo({ top: 0 });
    }

    // Re-render only specific row (for toggle done to update appearance without full rerender)
    function rerenderSetRow(exIdx, sIdx) {
      const entry = document.querySelector(`.set-entry[data-row="${exIdx}-${sIdx}"]`);
      if (!entry) { render(); return; }
      const set = state.current.exercises[exIdx].loggedSets[sIdx];
      entry.classList.toggle('done', !!set.done);
      const btn = entry.querySelector('.check-btn');
      btn.classList.toggle('checked', !!set.done);

      // Also update the done counter in header
      const w = state.current;
      const total = w.exercises.reduce((s,ex) => s + ex.loggedSets.length, 0);
      const done = w.exercises.reduce((s,ex) => s + ex.loggedSets.filter(x => x.done).length, 0);
      const counter = document.querySelector('.workout-header .display');
      if (counter) counter.textContent = done + '/' + total;
    }

    function attachInputListeners() {
      document.querySelectorAll('input[data-input]').forEach(input => {
        input.addEventListener('input', e => {
          const field = e.target.dataset.input;
          const exIdx = parseInt(e.target.dataset.ex);
          const sIdx = parseInt(e.target.dataset.set);
          if (state.current?.exercises?.[exIdx]?.loggedSets?.[sIdx]) {
            state.current.exercises[exIdx].loggedSets[sIdx][field] = e.target.value;
            saveCurrent();
          }
        });
      });
    }

    // ========================================================
    // ACTIONS
    // ========================================================
    function handleClick(e) {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      const action = target.dataset.action;

      if (action === 'nav') {
        state.view = target.dataset.view;
        if (state.view === 'workout' && !state.current) state.view = 'home';
        render();
      } else if (action === 'start') {
        if (state.current) return;
        const day = parseInt(target.dataset.day);
        startWorkout(day);
      } else if (action === 'resume') {
        state.view = 'workout';
        render();
      } else if (action === 'toggle-done') {
        const exIdx = parseInt(target.dataset.ex);
        const sIdx = parseInt(target.dataset.set);
        const set = state.current.exercises[exIdx].loggedSets[sIdx];
        set.done = !set.done;
        saveCurrent();
        rerenderSetRow(exIdx, sIdx);
      } else if (action === 'discard') {
        if (confirm('Training wirklich verwerfen? Daten gehen verloren.')) {
          state.current = null;
          saveCurrent();
          state.view = 'home';
          render();
        }
      } else if (action === 'complete') {
        completeWorkout();
      } else if (action === 'view-workout') {
        state.viewing = target.dataset.id;
        state.view = 'history-detail';
        render();
      } else if (action === 'dismiss-hint') {
        state.installHintDismissed = true;
        localStorage.setItem('eisern:installHintDismissed', 'true');
        render();
      } else if (action === 'rename-exercise') {
        const exIdx = parseInt(target.dataset.ex);
        const ex = state.current?.exercises?.[exIdx];
        if (!ex) return;
        const orig = ex.originalName || ex.name;
        const newName = prompt('Übung umbenennen (z.B. wenn die Maschine besetzt ist):', ex.name);
        if (newName === null) return;
        const trimmed = newName.trim();
        ex.name = trimmed === '' ? orig : trimmed;
        if (!ex.originalName) ex.originalName = orig;
        saveCurrent();
        render();
      } else if (action === 'mode') {
        state.mode = target.dataset.mode;
        state.editingWorkout = false;
        saveMode();
        render();
      } else if (action === 'edit-workout') {
        state.editingWorkout = true;
        render();
      } else if (action === 'cancel-edit-workout') {
        state.editingWorkout = false;
        render();
      } else if (action === 'save-edit-workout') {
        const w = state.workouts.find(x => x.id === state.viewing);
        if (!w) return;
        const dateV = document.getElementById('edit-date').value;
        const timeV = document.getElementById('edit-time').value || '00:00';
        const durV = document.getElementById('edit-duration').value;
        if (dateV) {
          const dt = new Date(dateV + 'T' + timeV);
          if (!isNaN(dt.getTime())) { w.completedAt = dt.toISOString(); w.date = w.completedAt; }
        }
        if (durV !== '' && !isNaN(parseInt(durV))) {
          w.durationMin = Math.max(0, parseInt(durV));
          // Startzeit konsistent zur Dauer setzen
          w.startedAt = new Date(new Date(w.completedAt).getTime() - w.durationMin * 60000).toISOString();
        }
        saveWorkouts();
        state.editingWorkout = false;
        render();
      } else if (action === 'nutri-nav') {
        state.nutriView = target.dataset.view;
        render();
      } else if (action === 'nutri-date-prev' || action === 'nutri-date-next') {
        const d = new Date(state.nutriDate + 'T00:00:00');
        d.setDate(d.getDate() + (action === 'nutri-date-next' ? 1 : -1));
        state.nutriDate = todayKey(d);
        render();
      } else if (action === 'nutri-open-day') {
        state.nutriDate = target.dataset.date;
        state.nutriView = 'day';
        render();
      } else if (action === 'nutri-add-item') {
        const ctx = target.dataset.ctx, mi = parseInt(target.dataset.meal);
        const meals = getMealsForCtx(ctx);
        meals[mi].items.push({ id: uid(), food: FOOD_DB[0].name, amount: 100 });
        saveCtx(ctx);
        render();
      } else if (action === 'nutri-del-item') {
        const ctx = target.dataset.ctx, mi = parseInt(target.dataset.meal), ii = parseInt(target.dataset.item);
        const meals = getMealsForCtx(ctx);
        meals[mi].items.splice(ii, 1);
        saveCtx(ctx);
        render();
      } else if (action === 'nutri-add-meal') {
        const ctx = target.dataset.ctx;
        const meals = getMealsForCtx(ctx);
        meals.push({ id: uid(), name: 'Mahlzeit ' + (meals.length + 1), items: [] });
        saveCtx(ctx);
        render();
      } else if (action === 'nutri-del-meal') {
        const ctx = target.dataset.ctx, mi = parseInt(target.dataset.meal);
        const meals = getMealsForCtx(ctx);
        if (confirm('Mahlzeit "' + meals[mi].name + '" löschen?')) {
          meals.splice(mi, 1);
          saveCtx(ctx);
          render();
        }
      } else if (action === 'nutri-rename-meal') {
        const ctx = target.dataset.ctx, mi = parseInt(target.dataset.meal);
        const meals = getMealsForCtx(ctx);
        const nn = prompt('Mahlzeit umbenennen:', meals[mi].name);
        if (nn === null) return;
        const t = nn.trim();
        if (t) { meals[mi].name = t; saveCtx(ctx); render(); }
      } else if (action === 'nutri-reset-day') {
        if (confirm('Diesen Tag wieder mit dem Baseline-Plan füllen? Aktuelle Einträge dieses Tages gehen verloren.')) {
          state.nutritionDays[state.nutriDate] = { meals: cloneMeals(state.nutritionPlan.meals) };
          saveNutritionDays();
          render();
        }
      }
    }

    function startWorkout(day) {
      const plan = PLANS[day];
      state.current = {
        id: Date.now().toString(),
        day,
        date: new Date().toISOString(),
        startedAt: new Date().toISOString(),
        completedAt: null,
        exercises: plan.exercises.map(ex => ({
          ...ex,
          originalName: ex.name,
          loggedSets: Array.from({ length: ex.sets }, (_, i) => ({
            weight: '', reps: '', rir: ex.targetRIR[i] ?? 0, note: '', done: false,
          })),
        })),
      };
      saveCurrent();
      state.view = 'workout';
      render();
    }

    function completeWorkout() {
      if (!state.current) return;
      const completedAt = new Date().toISOString();
      const durationMin = state.current.startedAt
        ? Math.max(0, Math.round((new Date(completedAt) - new Date(state.current.startedAt)) / 60000))
        : null;
      const finished = { ...state.current, completedAt, durationMin };
      state.workouts.push(finished);
      saveWorkouts();
      state.current = null;
      saveCurrent();
      state.view = 'home';
      render();
    }

    // ========================================================
    // INIT
    // ========================================================
    document.addEventListener('click', handleClick);
    loadState();
    render();

    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
      });
    }
  </script>
</body>
</html>
